[tool.coverage.run]
branch = true
source = [ "src" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/apps/acuity-model-training/html'
 --cov-report xml:'../../coverage/apps/acuity-model-training/coverage.xml'
 --html='../../reports/apps/acuity-model-training/unittests/html/index.html'
 --junitxml='../../reports/apps/acuity-model-training/unittests/junit.xml'
"""

[tool.poetry]
name = "acuity-model-training"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = [ ]
license = 'Proprietary'
readme = 'README.md'

  [[tool.poetry.packages]]
  include = "src"

  [tool.poetry.dependencies]
  python = ">=3.10"
  torch = "^2.0.0"
  transformers = "^4.36.0"
  datasets = "^2.15.0"
  accelerate = "^1.13.0"

  [tool.poetry.group.dev.dependencies]
  autopep8 = "2.3.1"
  flake8 = "7.1.1"
  pytest = "8.3.4"
  pytest-sugar = "1.0.0"
  pytest-cov = "6.0.0"
  pytest-html = "4.1.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"



